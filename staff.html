<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>店員訂單管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #f8fafc;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes ring-bell {

            0%,
            100% {
                transform: rotate(0deg);
            }

            20% {
                transform: rotate(15deg);
            }

            40% {
                transform: rotate(-10deg);
            }

            60% {
                transform: rotate(15deg);
            }

            80% {
                transform: rotate(-10deg);
            }
        }

        .animate-ring {
            animation: ring-bell 0.6s ease-in-out 2;
            transform-origin: top center;
        }

        .staff-filter-btn {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            border: 1.5px solid #e5e7eb;
            color: #6b7280;
            background: white;
            cursor: pointer;
            transition: all 0.15s;
        }

        .staff-filter-btn:hover,
        .staff-filter-btn.active {
            border-color: #10b981;
            color: #059669;
            background: #ecfdf5;
        }
    </style>
</head>

<body class="min-h-screen">
    <header class="bg-white border-b border-gray-100 sticky top-0 z-20 shadow-sm">
        <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">

            <div class="flex items-center gap-2 sm:gap-3 min-w-0 pr-2">
                <div id="store-status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-300 shrink-0"></div>
                <span id="store-name-header" class="font-black text-gray-800 text-base truncate">載入中...</span>
            </div>

            <div class="flex items-center gap-2 sm:gap-3 shrink-0">

                <div class="flex items-center bg-gray-100 rounded-xl p-1">
                    <button class="staff-filter-btn active" data-filter="all">全部</button>
                    <button class="staff-filter-btn" data-filter="active">待處理</button>
                    <button class="staff-filter-btn" data-filter="completed">已完成</button>
                </div>

                <div class="w-px h-6 bg-gray-200"></div>

                <div id="header-order-icon"
                    class="relative p-1 text-gray-400 transition-colors flex items-center justify-center shrink-0">
                    <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                    <span id="header-order-count"
                        class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden border-2 border-white shadow-sm leading-tight min-w-[20px] text-center">0</span>
                </div>

            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-5 space-y-3" id="orders-container">
        <div class="text-center py-20">
            <i data-lucide="loader" class="w-8 h-8 mx-auto animate-spin text-gray-300"></i>
        </div>
    </main>

    <div id="closed-overlay"
        class="hidden fixed inset-0 z-50 bg-white flex flex-col items-center justify-center text-center px-8">
        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-6">
            <i data-lucide="moon" class="w-10 h-10 text-gray-400"></i>
        </div>
        <h2 id="closed-store-name" class="text-2xl font-black text-gray-800 mb-2"></h2>
        <p class="text-lg font-bold text-gray-500 mb-1">目前休息中</p>
        <p class="text-sm text-gray-400">請等待店家開始營業</p>
    </div>

    <script src="js/config.js"></script>
    <script>
        const notifAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2866/2866-preview.mp3');
        notifAudio.preload = 'auto';

        window.playNotification = function () {
            notifAudio.currentTime = 0;
            notifAudio.play().catch(e => console.log('記得先點擊畫面一下，才能解鎖音效喔！', e));

            // 🌟 讓菜單圖示發光搖晃
            const iconWrap = document.getElementById('header-order-icon');
            if (iconWrap) {
                iconWrap.classList.remove('animate-ring', 'text-emerald-500');
                void iconWrap.offsetWidth;

                iconWrap.classList.remove('text-gray-400');
                iconWrap.classList.add('animate-ring', 'text-emerald-500');

                setTimeout(() => {
                    iconWrap.classList.remove('animate-ring', 'text-emerald-500');
                    iconWrap.classList.add('text-gray-400');
                }, 1500);
            }
        };

        (async function () {
            const params = new URLSearchParams(location.search);
            const storeId = params.get('store_id');

            if (!storeId) {
                document.getElementById('orders-container').innerHTML =
                    '<p class="text-center text-red-500 font-bold py-20">連結無效，請重新取得店員連結</p>';
                lucide.createIcons();
                return;
            }

            const STATUS_CONFIG = {
                pending: { label: '未付款', icon: 'banknote', bg: 'bg-amber-50', text: 'text-amber-600', border: 'border-amber-200', pulse: true },
                confirmed: { label: '已確認', icon: 'check', bg: 'bg-blue-50', text: 'text-blue-600', border: 'border-blue-200', pulse: false },
                preparing: { label: '製作中', icon: 'flame', bg: 'bg-orange-50', text: 'text-orange-600', border: 'border-orange-200', pulse: true },
                ready: { label: '可取餐', icon: 'bell', bg: 'bg-emerald-50', text: 'text-emerald-600', border: 'border-emerald-200', pulse: false },
                completed: { label: '已完成', icon: 'check-circle', bg: 'bg-gray-100', text: 'text-gray-500', border: 'border-gray-200', pulse: false },
                cancelled: { label: '已取消', icon: 'x-circle', bg: 'bg-red-50', text: 'text-red-400', border: 'border-red-100', pulse: false },
            };

            const NEXT_STATUS = {
                pending: { status: 'preparing', label: '確認並製作' },
                preparing: { status: 'ready', label: '製作完成' },
                ready: { status: 'completed', label: '完成取餐' },
            };

            const PAY_LABEL = { cash: '現金', card: '刷卡', linepay: 'Line Pay' };

            let allOrders = [];
            let currentFilter = 'all';
            let storeIsOpen = true;
            let realtimeChannel = null;

            async function checkStore() {
                const { data: store } = await window.supabaseClient
                    .from('stores').select('name, is_open').eq('id', storeId).single();
                if (!store) return;

                document.getElementById('store-name-header').textContent = store.name;
                document.title = `${store.name} · 店員管理`;

                storeIsOpen = store.is_open !== false;
                updateStoreStatusUI();

                if (!storeIsOpen) {
                    document.getElementById('closed-store-name').textContent = store.name;
                    document.getElementById('closed-overlay').classList.remove('hidden');
                }
            }

            function updateStoreStatusUI() {
                const dot = document.getElementById('store-status-dot');
                if (storeIsOpen) {
                    dot.className = 'w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse';
                } else {
                    dot.className = 'w-2.5 h-2.5 rounded-full bg-gray-300';
                }
            }

            function renderItemOptions(options) {
                if (!options || typeof options !== 'object' || Object.keys(options).length === 0) return '';
                const parts = Object.values(options).map(opt => {
                    if (opt.type === 'text') return `${opt.label}：${opt.value || ''}`;
                    const choices = (opt.choices || []).map(c => c.label).join('、');
                    return choices ? `${opt.label}：${choices}` : null;
                }).filter(Boolean);
                if (!parts.length) return '';
                return parts.map(p =>
                    `<span class="text-xs text-amber-700 bg-amber-50 border border-amber-100 rounded-lg px-2 py-0.5 font-medium">${p}</span>`
                ).join(' ');
            }

            async function loadOrders() {
                const todayStart = new Date();
                todayStart.setHours(0, 0, 0, 0);

                const { data: orders } = await window.supabaseClient
                    .from('orders')
                    .select('*, order_items(product_name, quantity, subtotal, options)')
                    .eq('store_id', storeId)
                    .gte('created_at', todayStart.toISOString())
                    .order('created_at', { ascending: false });

                allOrders = orders || [];
                renderOrders();
            }

            function getFiltered() {
                if (currentFilter === 'active') return allOrders.filter(o => !['completed', 'cancelled'].includes(o.status));
                if (currentFilter === 'completed') return allOrders.filter(o => o.status === 'completed');
                return allOrders;
            }

            function renderOrders() {
                const container = document.getElementById('orders-container');
                const filtered = getFiltered();

                if (filtered.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 text-gray-400">
                    <i data-lucide="inbox" class="w-10 h-10 mx-auto mb-3 text-gray-200"></i>
                    <p class="font-bold text-sm">目前沒有訂單</p>
                </div>`;
                } else {
                    container.innerHTML = filtered.map(order => renderCard(order)).join('');
                }

                lucide.createIcons();

                container.querySelectorAll('.action-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (btn.dataset.action === 'pay_and_prepare') {
                            markPaidAndPrepare(btn.dataset.id);
                        } else {
                            updateStatus(btn.dataset.id, btn.dataset.next);
                        }
                    });
                });

                container.querySelectorAll('.cancel-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const label = btn.innerText.includes('拒絕') ? '拒絕接單' : '取消訂單';
                        if (confirm(`確定要${label}嗎？此操作無法復原。`)) {
                            updateStatus(btn.dataset.id, 'cancelled');
                        }
                    });
                });

                // 🌟 即時更新右上角紅字數量
                const pendingCount = allOrders.filter(o => o.status === 'pending').length;
                const headerCountBadge = document.getElementById('header-order-count');

                if (headerCountBadge) {
                    if (pendingCount > 0) {
                        headerCountBadge.textContent = pendingCount;
                        headerCountBadge.classList.remove('hidden');
                    } else {
                        headerCountBadge.classList.add('hidden');
                    }
                }
            }

            function renderCard(order) {
                const s = STATUS_CONFIG[order.status] || STATUS_CONFIG.pending;
                const next = NEXT_STATUS[order.status];
                const num = String(order.daily_number || 0).padStart(3, '0');
                const time = new Date(order.created_at).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
                const items = order.order_items || [];
                const pay = PAY_LABEL[order.payment_method] || '現金';
                const isPaid = order.is_paid;

                const isCompleted = ['completed', 'cancelled'].includes(order.status);
                const canCancel = ['pending', 'confirmed', 'preparing'].includes(order.status);
                const cancelLabel = order.status === 'pending' ? '拒接' : '取消';

                let actionBtnHtml = '';
                if (order.status === 'pending') {
                    actionBtnHtml = `<button class="action-btn flex-1 py-3 rounded-xl bg-gray-800 hover:bg-gray-900 text-white font-bold text-sm transition-transform active:scale-95 flex items-center justify-center gap-2 shadow-sm" data-id="${order.id}" data-action="pay_and_prepare">
                        <i data-lucide="check-circle" class="w-4 h-4 text-emerald-400"></i> 確認收款並製作
                    </button>`;
                } else if (next) {
                    actionBtnHtml = `<button class="action-btn flex-1 py-3 rounded-xl bg-gray-800 hover:bg-gray-900 text-white font-bold text-sm transition-transform active:scale-95 flex items-center justify-center gap-2 shadow-sm" data-id="${order.id}" data-action="next_status" data-next="${next.status}">
                        <i data-lucide="arrow-right" class="w-4 h-4 text-emerald-400"></i> ${next.label}
                    </button>`;
                }

                return `
                <div class="bg-white rounded-2xl border ${order.status === 'pending' ? 'border-amber-200 shadow-amber-50' : order.status === 'cancelled' ? 'border-red-100' : 'border-gray-100'} shadow-sm flex flex-col transition-all mb-4 ${isCompleted ? 'opacity-60' : ''}">
                    
                    <div class="px-5 py-4 border-b border-gray-50 bg-gray-50/30 rounded-t-2xl flex items-start justify-between">
                        <div class="flex items-center gap-4">
                            <div class="text-center">
                                <div class="font-black text-2xl text-gray-800 leading-none">#${num}</div>
                                <div class="text-xs text-gray-400 mt-1">${time}</div>
                            </div>
                            <div class="w-px h-10 bg-gray-200"></div>
                            <div>
                                <div class="font-black text-gray-800 text-lg leading-tight">${order.table_name}</div>
                                <div class="text-[10px] text-gray-500 mt-1">${pay}</div>
                            </div>
                        </div>
                        
                        <div class="flex flex-col items-end gap-2 shrink-0">
                            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-xl ${s.bg} ${s.text} border ${s.border} text-xs font-bold ${s.pulse && !isCompleted ? 'animate-pulse' : ''}">
                                <i data-lucide="${s.icon}" class="w-3.5 h-3.5"></i> ${s.label}
                            </span>
                        </div>
                    </div>

                    <div class="px-5 py-4">
                        <div class="space-y-3">
                            ${items.map(item => {
                    const optHtml = renderItemOptions(item.options);
                    return `
                            <div class="text-sm">
                                <div class="flex items-center justify-between">
                                    <span class="text-gray-700 font-bold">${item.product_name}</span>
                                    <div class="flex items-center gap-3 shrink-0 ml-3">
                                        <span class="text-gray-400 font-mono text-xs">×${item.quantity}</span>
                                        <span class="font-bold text-gray-800 w-16 text-right">NT$${item.subtotal.toLocaleString()}</span>
                                    </div>
                                </div>
                                ${optHtml ? `<div class="flex flex-wrap gap-1 mt-1.5">${optHtml}</div>` : ''}
                            </div>`;
                }).join('')}
                        </div>
                        
                        <div class="mt-4 pt-3 border-t border-gray-50 flex items-center justify-between flex-wrap gap-2">
                            <div class="flex items-center gap-2 flex-wrap">
                                ${order.note ? `<span class="text-xs text-amber-700 bg-amber-50 border border-amber-100 rounded-lg px-2 py-0.5 font-medium">📝 ${order.note}</span>` : ''}
                                ${isPaid ? `<span class="text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-100 px-2 py-0.5 rounded-lg">✓ 已付款</span>` : ''}
                            </div>
                            <span class="font-black text-gray-800 text-base shrink-0">NT$ ${(order.total_price || 0).toLocaleString()}</span>
                        </div>
                    </div>

                    ${(!isCompleted) ? `
                    <div class="px-5 py-4 flex gap-3 border-t border-gray-50 bg-white rounded-b-2xl">
                        ${canCancel ? `
                        <button class="cancel-btn px-4 py-3 rounded-xl bg-white hover:bg-red-50 text-red-500 font-bold text-sm transition-colors border border-red-100 flex items-center justify-center gap-1.5 shadow-sm shrink-0" data-id="${order.id}">
                            <i data-lucide="x-circle" class="w-4 h-4"></i> ${cancelLabel}
                        </button>` : ''}
                        ${actionBtnHtml}
                    </div>` : ''}
                </div>`;
            }

            async function updateStatus(orderId, newStatus) {
                const order = allOrders.find(o => o.id === orderId);
                if (order) order.status = newStatus;
                renderOrders();
                await window.supabaseClient.from('orders')
                    .update({ status: newStatus, updated_at: new Date().toISOString() })
                    .eq('id', orderId);
            }

            async function markPaidAndPrepare(orderId) {
                const order = allOrders.find(o => o.id === orderId);
                if (!order) return;
                order.is_paid = true;
                order.status = 'preparing';
                renderOrders();
                await window.supabaseClient.from('orders').update({
                    is_paid: true, status: 'preparing', updated_at: new Date().toISOString()
                }).eq('id', orderId);
            }

            function subscribeRealtime() {
                if (realtimeChannel) {
                    window.supabaseClient.removeChannel(realtimeChannel);
                }

                realtimeChannel = window.supabaseClient
                    .channel('staff-orders-' + storeId)
                    .on('postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'orders',
                        filter: `store_id=eq.${storeId}`
                    }, async (payload) => {

                        if (payload.eventType === 'INSERT') {
                            window.playNotification();
                        }
                        await loadOrders();
                    })
                    .on('postgres_changes', {
                        event: 'UPDATE',
                        schema: 'public',
                        table: 'stores',
                        filter: `id=eq.${storeId}`
                    }, (payload) => {
                        storeIsOpen = payload.new.is_open !== false;
                        updateStoreStatusUI();
                        if (!storeIsOpen) {
                            document.getElementById('closed-overlay').classList.remove('hidden');
                        } else {
                            document.getElementById('closed-overlay').classList.add('hidden');
                        }
                    })
                    .subscribe();
            }

            document.querySelectorAll('.staff-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.staff-filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderOrders();
                });
            });

            await checkStore();
            await loadOrders();
            subscribeRealtime();

        })();
    </script>
</body>

</html>
