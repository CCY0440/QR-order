<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>線上點餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #f8fafc;
        }

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .cat-btn.active {
            background: #ecfdf5;
            color: #059669;
            border-color: #10b981;
            font-weight: 800;
        }

        .product-card {
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .product-card:active {
            transform: scale(0.97);
        }

        .qty-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 900;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }
    </style>
</head>

<body class="selection:bg-emerald-200 min-h-screen">

    <div id="closed-overlay" class="hidden fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center text-center px-8">
        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-6">
            <i data-lucide="moon" class="w-10 h-10 text-gray-400"></i>
        </div>
        <h2 id="closed-name" class="text-2xl font-black text-gray-800 mb-2"></h2>
        <p class="text-lg font-bold text-gray-500 mb-1">目前暫停營業中</p>
        <p class="text-sm text-gray-400">請稍後再試</p>
    </div>

    <header class="bg-white sticky top-0 z-40 shadow-sm">
        <div class="h-1.5 w-full bg-gradient-to-r from-emerald-400 via-teal-400 to-emerald-500"></div>

        <div class="px-5 py-4 flex items-center gap-4">
            <div id="logo-wrap" class="w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl border border-emerald-100 overflow-hidden flex items-center justify-center shrink-0 shadow-sm">
                <i data-lucide="utensils" class="w-6 h-6 sm:w-8 sm:h-8 text-emerald-400" id="store-logo-fallback"></i>
                <img id="store-logo" class="w-full h-full object-cover hidden" />
            </div>
            <div class="flex-1 min-w-0">
                <h1 id="store-name" class="text-xl sm:text-2xl font-black text-gray-800 leading-tight truncate mb-1">載入中...</h1>
                <span id="table-badge" class="text-sm font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-lg border border-emerald-100 inline-block"></span>
            </div>
            <button id="btn-cart-mobile" class="relative shrink-0 w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-md shadow-emerald-500/25 active:scale-95 transition-transform hidden">
                <i data-lucide="shopping-bag" class="w-5 h-5 text-white"></i>
                <span id="cart-count-mobile" class="qty-badge hidden">0</span>
            </button>
        </div>

        <div id="store-desc-wrap" class="hidden px-5 pb-3">
            <p id="store-desc" class="text-sm text-gray-500 leading-relaxed bg-gray-50 p-3 rounded-xl border border-gray-100"></p>
        </div>

        <nav id="category-nav" class="flex overflow-x-auto hide-scroll px-5 pb-3 pt-1 gap-2 border-t border-gray-100">
            <div class="animate-pulse flex gap-2">
                <div class="w-16 h-8 bg-gray-100 rounded-full"></div>
                <div class="w-20 h-8 bg-gray-100 rounded-full"></div>
            </div>
        </nav>
    </header>

    <div class="max-w-6xl mx-auto px-4 py-5 lg:flex lg:gap-6">
        <main class="flex-1 min-w-0 pb-28" id="menu-container">
            <div class="flex justify-center py-20">
                <i data-lucide="loader" class="w-8 h-8 text-emerald-500 animate-spin"></i>
            </div>
        </main>
        
        <aside class="hidden lg:block w-80 shrink-0">
            <div class="sticky top-32">
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="px-5 py-4 border-b border-gray-50 flex items-center justify-between">
                        <h3 class="font-black text-gray-800">我的點單</h3>
                        <span id="cart-count-desktop" class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-100">0 項</span>
                    </div>
                    <div id="cart-list-desktop" class="divide-y divide-gray-50 max-h-96 overflow-y-auto hide-scroll">
                        <p class="text-center text-gray-300 text-sm py-10 px-4">尚未選擇任何餐點</p>
                    </div>
                    <div class="p-4 border-t border-gray-50 space-y-3">
                        <textarea id="cart-note-desktop" rows="2" placeholder="備註（選填）..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-xs outline-none focus:ring-2 focus:ring-emerald-500 resize-none transition-all"></textarea>
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-bold text-gray-500">合計</span>
                            <span id="cart-total-desktop" class="text-xl font-black text-gray-800">NT$ 0</span>
                        </div>
                        <div class="grid grid-cols-3 gap-1.5">
                            <label class="flex flex-col items-center gap-1 p-2 border-2 rounded-xl cursor-pointer has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-50 border-gray-200 transition-all">
                                <i data-lucide="banknote" class="w-4 h-4 text-gray-500"></i>
                                <span class="text-[10px] font-bold text-gray-600">現金</span>
                                <input type="radio" name="payment-desktop" value="cash" class="sr-only" checked>
                            </label>
                            <label class="flex flex-col items-center gap-1 p-2 border-2 rounded-xl cursor-not-allowed opacity-40 border-gray-200">
                                <i data-lucide="credit-card" class="w-4 h-4 text-gray-400"></i>
                                <span class="text-[10px] font-bold text-gray-400">刷卡</span>
                                <input type="radio" name="payment-desktop" value="card" class="sr-only" disabled>
                            </label>
                            <label class="flex flex-col items-center gap-1 p-2 border-2 rounded-xl cursor-not-allowed opacity-40 border-gray-200">
                                <i data-lucide="smartphone" class="w-4 h-4 text-gray-400"></i>
                                <span class="text-[10px] font-bold text-gray-400">行動支付</span>
                                <input type="radio" name="payment-desktop" value="linepay" class="sr-only" disabled>
                            </label>
                        </div>
                        <button id="btn-checkout-desktop" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-2xl transition-all active:scale-95 shadow-md shadow-emerald-500/20 disabled:opacity-40 disabled:cursor-not-allowed" disabled>送出訂單</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <div id="cart-bar" class="lg:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 shadow-[0_-8px_20px_rgba(0,0,0,0.08)] px-4 py-3 z-[45] transform translate-y-full transition-transform duration-300">
        <button id="btn-checkout" class="w-full bg-emerald-500 text-white font-bold py-3.5 rounded-2xl active:scale-95 transition-transform shadow-md shadow-emerald-500/20 flex items-center justify-between px-5">
            <span class="flex items-center gap-2"><i data-lucide="shopping-bag" class="w-5 h-5"></i><span id="cart-count-bar">0 項</span></span>
            <span>送出訂單</span>
            <span id="cart-total-bar" class="font-black">NT$ 0</span>
        </button>
    </div>

    <div id="product-modal" class="fixed inset-0 z-[130] flex items-center justify-center p-4 hidden transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" onclick="closeProductModal()"></div>
        
        <div class="modal-card relative bg-white w-full max-w-md rounded-[24px] shadow-2xl flex flex-col max-h-[90vh] transform scale-95 opacity-0 transition-all duration-300 z-10 overflow-hidden">
            <div class="relative w-full shrink-0 bg-gray-50 hidden" id="pm-img-wrap">
                <img id="pm-img" src="" class="w-full h-48 sm:h-56 object-cover">
                <button onclick="closeProductModal()" class="absolute top-3 right-3 w-8 h-8 bg-black/50 text-white rounded-full flex items-center justify-center backdrop-blur-md hover:bg-black/70 transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="p-5 overflow-y-auto flex-1">
                <div class="flex justify-between items-start mb-3 gap-4">
                    <div>
                        <h2 id="pm-name" class="text-xl font-black text-gray-800 leading-tight"></h2>
                        <p id="pm-price" class="text-emerald-600 font-bold mt-1"></p>
                    </div>
                    <button id="pm-close-no-img" onclick="closeProductModal()" class="w-8 h-8 bg-gray-100 text-gray-500 rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors shrink-0 hidden">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p id="pm-desc" class="text-sm text-gray-500 leading-relaxed mb-5"></p>
                <div id="pm-options" class="space-y-6"></div>
            </div>

            <div class="p-4 border-t border-gray-100 bg-gray-50 flex items-center gap-3 shrink-0">
                <div class="flex items-center gap-2 bg-white border border-gray-200 rounded-xl p-1 shadow-sm shrink-0">
                    <button id="pm-minus" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-lg transition-colors active:scale-95"><i data-lucide="minus" class="w-5 h-5"></i></button>
                    <span id="pm-qty" class="w-8 text-center font-bold text-lg text-gray-800">1</span>
                    <button id="pm-plus" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-lg transition-colors active:scale-95"><i data-lucide="plus" class="w-5 h-5"></i></button>
                </div>
                <button id="pm-add-btn" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-emerald-500/30 active:scale-95 truncate px-2 text-base">
                    加入點單
                </button>
            </div>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 z-[120] flex items-center justify-center p-4 hidden transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" onclick="hideModal('checkout-modal')"></div>
        
        <div class="modal-card relative bg-white w-full max-w-md rounded-[24px] shadow-2xl flex flex-col max-h-[90vh] transform scale-95 opacity-0 transition-all duration-300 z-10 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                <h3 class="font-black text-gray-800 text-lg">結帳確認</h3>
                <button id="btn-close-checkout" class="text-gray-400 hover:text-red-500 p-1.5 rounded-lg transition-colors bg-white shadow-sm border border-gray-100">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto">
                <div id="checkout-items" class="p-5 space-y-0 divide-y divide-gray-50 border-b border-gray-100"></div>

                <div class="px-5 py-4 bg-gray-50/50">
                    <label class="block text-sm font-bold text-gray-700 mb-2">付款方式</label>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <label class="relative flex flex-col items-center justify-center py-2.5 border-2 border-emerald-500 bg-emerald-50 rounded-xl cursor-pointer transition-all">
                            <input type="radio" name="payment" value="cash" class="sr-only" checked>
                            <i data-lucide="banknote" class="w-5 h-5 text-emerald-600 mb-1"></i>
                            <span class="text-xs font-bold text-emerald-700">現金</span>
                        </label>
                        <label class="relative flex flex-col items-center justify-center py-2.5 border-2 border-gray-100 bg-gray-50 rounded-xl opacity-50 cursor-not-allowed">
                            <input type="radio" name="payment" value="card" class="sr-only" disabled>
                            <i data-lucide="credit-card" class="w-5 h-5 text-gray-400 mb-1"></i>
                            <span class="text-[10px] font-bold text-gray-500">刷卡</span>
                        </label>
                        <label class="relative flex flex-col items-center justify-center py-2.5 border-2 border-gray-100 bg-gray-50 rounded-xl opacity-50 cursor-not-allowed">
                            <input type="radio" name="payment" value="linepay" class="sr-only" disabled>
                            <i data-lucide="smartphone" class="w-5 h-5 text-gray-400 mb-1"></i>
                            <span class="text-[10px] font-bold text-gray-500">LINE Pay</span>
                        </label>
                    </div>

                    <label class="block text-sm font-bold text-gray-700 mb-2">備註 <span class="font-normal text-gray-400">（選填）</span></label>
                    <textarea id="checkout-note" rows="1" placeholder="例如：不要香菜..." class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500 resize-none transition-all mb-2"></textarea>

                    <div id="checkout-cash-note" class="p-3 bg-amber-50 border border-amber-100 rounded-xl">
                        <p class="text-xs font-bold text-amber-700 flex items-center gap-1.5">
                            <i data-lucide="info" class="w-4 h-4 shrink-0"></i> 請至櫃檯出示訂單號碼並付款
                        </p>
                    </div>
                </div>
            </div>

            <div class="px-5 py-4 border-t border-gray-100 bg-white shrink-0">
                <button id="btn-confirm-order" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-emerald-500/30 active:scale-95 flex items-center justify-center gap-2 text-lg">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    送出訂單 · NT$ <span id="checkout-total">0</span>
                </button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/order.js"></script>
</body>
</html>
