<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>線上點餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            padding-bottom: 100px;
        }

        .hide-scroll::-webkit-scrollbar {
            display: none;
        }

        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="selection:bg-emerald-200">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div id="store-banner" class="h-24 bg-gradient-to-r from-emerald-400 to-teal-500 w-full object-cover"></div>
        <div class="px-5 pt-3 pb-4 flex justify-between items-end -mt-10 relative">
            <div class="flex gap-4 items-end">
                <div id="store-logo-container"
                    class="w-20 h-20 bg-white rounded-2xl shadow-md border-4 border-white overflow-hidden flex items-center justify-center shrink-0">
                    <i data-lucide="store" class="w-8 h-8 text-gray-300" id="store-logo-fallback"></i>
                    <img id="store-logo" class="w-full h-full object-cover hidden" />
                </div>
                <div class="mb-1">
                    <h1 id="store-name" class="text-xl font-black text-gray-800 leading-tight">載入中...</h1>
                    <p id="table-name"
                        class="text-sm font-bold text-emerald-600 mt-0.5 bg-emerald-50 inline-block px-2 py-0.5 rounded-md border border-emerald-100">
                    </p>
                </div>
            </div>
        </div>

        <nav id="category-nav"
            class="flex overflow-x-auto hide-scroll px-4 py-3 gap-2 border-t border-gray-100 bg-white shadow-[0_4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div class="animate-pulse w-16 h-8 bg-gray-100 rounded-full"></div>
            <div class="animate-pulse w-20 h-8 bg-gray-100 rounded-full"></div>
        </nav>
    </header>

    <main class="p-4 max-w-2xl mx-auto" id="menu-container">
        <div class="flex justify-center py-20"><i data-lucide="loader"
                class="w-8 h-8 text-emerald-500 animate-spin"></i></div>
    </main>

    <div id="cart-bar"
        class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] p-4 pb-safe z-50 transform translate-y-full transition-transform duration-300 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="relative">
                <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-gray-600">
                    <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                </div>
                <span id="cart-count"
                    class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </div>
            <div>
                <p class="text-xs text-gray-500 font-bold">總計</p>
                <p class="text-xl font-black text-gray-800 leading-none">NT$ <span id="cart-total">0</span></p>
            </div>
        </div>
        <button id="btn-checkout"
            class="bg-emerald-500 text-white font-bold py-3 px-8 rounded-2xl active:scale-95 transition-transform shadow-md shadow-emerald-500/20">
            結帳送出
        </button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/order.js"></script>
</body>

</html>
