<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入系統 - QR 點餐管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }

        /* 表單切換的淡入動畫 */
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 sm:p-6 selection:bg-emerald-200">

    <div class="w-full max-w-md bg-white rounded-[24px] shadow-xl border border-gray-100 overflow-hidden relative">

        <div class="h-2 w-full bg-emerald-500"></div>

        <div class="p-8 sm:p-10">
            <div class="flex justify-center mb-8">
                <div
                    class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center shadow-inner">
                    <i data-lucide="utensils" class="w-7 h-7"></i>
                </div>
            </div>

            <h2 id="auth-title" class="text-2xl font-bold text-center text-gray-800 mb-2">歡迎回來</h2>
            <p id="auth-subtitle" class="text-sm text-center text-gray-500 mb-8">請登入您的店家管理帳號</p>

            <form id="login-form" class="space-y-5 fade-in">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">電子郵件</label>
                    <div class="relative">
                        <i data-lucide="mail"
                            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="email" id="login-email" required placeholder="請輸入電子郵件"
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-gray-800">
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="block text-sm font-bold text-gray-700">密碼</label>
                        <a href="#" class="text-xs font-bold text-emerald-600 hover:text-emerald-700">忘記密碼？</a>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock"
                            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="password" id="login-password" required placeholder="••••••••"
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-gray-800">
                    </div>
                </div>

                <div id="login-error"
                    class="hidden text-sm text-red-500 font-bold text-center bg-red-50 py-2 rounded-lg">
                    帳號或密碼錯誤，請重試。
                </div>

                <button type="submit"
                    class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-md shadow-emerald-500/20 active:scale-95 flex justify-center items-center gap-2">
                    登入系統 <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>

                <p class="text-center text-sm text-gray-500 mt-6">
                    還沒有帳號嗎？
                    <button type="button" id="btn-show-register"
                        class="font-bold text-emerald-600 hover:text-emerald-700 underline underline-offset-4">立即註冊</button>
                </p>
            </form>

            <form id="register-form" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">店家名稱 <span
                            class="text-red-500">*</span></label>
                    <div class="relative">
                        <i data-lucide="store"
                            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="text" id="register-store-name" required placeholder="例如：招牌小餐館"
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-gray-800">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">電子郵件</label>
                    <div class="relative">
                        <i data-lucide="mail"
                            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="email" id="register-email" required placeholder="example@gmail.com"
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-gray-800">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">設定密碼</label>
                    <div class="relative">
                        <i data-lucide="lock"
                            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="password" id="register-password" required placeholder="至少 8 碼，包含大小寫與數字"
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-gray-800">
                    </div>
                    <p class="text-[11px] text-gray-400 mt-1.5 ml-1">需含大、小寫英文與數字，且長度至少 8 碼。</p>
                </div>

                <div id="register-error"
                    class="hidden text-sm text-red-500 font-bold text-center bg-red-50 py-2 rounded-lg"></div>

                <button type="submit"
                    class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3.5 rounded-xl transition-all shadow-md active:scale-95 flex justify-center items-center gap-2">
                    建立店家帳號 <i data-lucide="user-plus" class="w-4 h-4"></i>
                </button>

                <p class="text-center text-sm text-gray-500 mt-6">
                    已經有帳號了？
                    <button type="button" id="btn-show-login" class="font-bold text-emerald-600 underline">返回登入</button>
                </p>
            </form>

        </div>
    </div>

    <div id="success-modal"
        class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm hidden">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl scale-95 opacity-0 transition-all duration-300 transform"
            id="modal-card">
            <div class="flex flex-col items-center text-center">
                <div
                    class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6 shadow-inner">
                    <i data-lucide="check-circle-2" class="w-10 h-10"></i>
                </div>

                <h3 class="text-2xl font-bold text-gray-800 mb-2">帳號建立成功！</h3>
                <p class="text-gray-500 leading-relaxed mb-8">
                    歡迎加入！您的店家帳號已準備就緒，現在您可以直接登入系統開始設定。
                </p>

                <button id="btn-modal-close"
                    class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-emerald-500/20 active:scale-95">
                    立即去登入
                </button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
