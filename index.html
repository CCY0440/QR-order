<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在導引至您的餐廳...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="text-center">
        <div
            class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent mb-4">
        </div>
        <p class="text-gray-500 font-medium">系統檢查中，請稍候...</p>
    </div>

    <script src="js/config.js"></script>
    <script>
        async function checkAccess() {
            // 🌟 改用 supabaseClient
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const { data: storeData } = await supabaseClient
                .from('stores')
                .select('is_initialized')
                .eq('owner_id', user.id)
                .single();

            if (storeData && storeData.is_initialized) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'onboarding.html';
            }
        }
        checkAccess();
    </script>
</body>

</html>
